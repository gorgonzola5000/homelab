# # cspell:ignore cmdline, workdir
---
ansible-navigator:
  ansible-runner:
    artifact-dir: /tmp/ansible-runner
  execution-environment:
    image: homelab:latest
    pull:
      policy: never
    volume-mounts:
      - src: "../sops"
        dest: "/sops"
      - src: "../.sops.yaml"
        dest: "/.sops.yaml"
      - src: "~/.kube/config"
        dest: "/root/.kube/config"
        options: "Z"
  logging:
    level: critical
    append: False
    file: /tmp/ansible-runner/log.txt
  mode: stdout
  playbook-artifact:
    enable: False
