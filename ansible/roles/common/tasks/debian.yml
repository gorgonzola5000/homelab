---
- name: Configure Debian base and updates repositories
  ansible.builtin.deb822_repository:
    name: debian
    types:
      - deb
      - deb-src
    uris:
      - http://ftp.psnc.pl/debian
      - http://deb.debian.org/debian
    suites:
      - trixie
      - trixie-updates
    components:
      - main
      - contrib
      - non-free
      - non-free-firmware
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg
    state: present

- name: Configure Debian security repository
  ansible.builtin.deb822_repository:
    name: debian-security
    types:
      - deb
      - deb-src
    uris: http://security.debian.org/debian-security/
    suites:
      - trixie-security
    components:
      - main
      - contrib
      - non-free
      - non-free-firmware
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg
    state: present


- name: Ensure trixie-backports repository is present
  ansible.builtin.deb822_repository:
    name: trixie-backports
    types:
      - deb
      - deb-src
    uris: http://deb.debian.org/debian
    suites:
      - trixie-backports
    components:
      - main
      - contrib
      - non-free
      - non-free-firmware
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg
    state: present

- name: Debian - Full system upgrade
  ansible.builtin.apt:
    update_cache: true
    upgrade: full

- name: Debian - Ensure unattended_upgrades, debconf are present
  ansible.builtin.apt:
    name:
      - debconf
      - debconf-utils
      - unattended-upgrades
    state: present

- name: Debian - Enable automatic updates (power switch)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: '0644'
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Allow unattended-upgrades for Trixie Backports
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    insertafter: 'origin=Debian,codename=\${distro_codename}-security,label=Debian-Security'
    line: '        "origin=Debian Backports,codename=${distro_codename}-backports,label=Debian Backports";'
    state: present
