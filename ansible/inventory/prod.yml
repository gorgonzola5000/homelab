echoes:
  hosts:
    echoes.home.parents-basement.win:
      root_password_hash: "{{ vault_echoes_root_password | password_hash }}"
      clevis_bindings:
        device: /dev/nvme0n1p3
        servers:
          - http://10.2.137.210:7500
      zpool:
        physical_disks:
          - /dev/disk/by-id/wwn-0x5000cca0282cdfb4
          - /dev/disk/by-id/wwn-0x5000cca0289aa3a0
          - /dev/disk/by-id/wwn-0x5000cca0289af74c
          - /dev/disk/by-id/wwn-0x5000cca028cad8e8
          - /dev/disk/by-id/wwn-0x5000cca06d22747c
          - /dev/disk/by-id/wwn-0x5000cca06d25f8e8
        tank_keyfile_contents: "{{ vault_tank_keyfile }}"
      cluster_name: meddle
      flux_secret_content: "{{ lookup('community.sops.sops', 'sops/meddle/flux-secret.enc.yaml') }}"
      dac:
        ipv6: fded:bf35:8058:2137:fded:bf35:8058:1
        nic: enp3s0f1np1
        peer_ipv6: fded:bf35:8058:2137:fded:bf35:8058:2
        peer_hostname: dogs
