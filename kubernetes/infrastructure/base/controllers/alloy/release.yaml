apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: alloy
spec:
  interval: 30m
  chart:
    spec:
      chart: alloy
      version: "1.8.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
  values:
    alloy:
      envFrom:
        - secretRef:
            name: alloy
        - secretRef:
            name: global-secrets
      configMap:
        create: false
        name: alloy
