---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: keycloak-db-1
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /tank/static/keycloak/keycloak-db-1
  claimRef:
    name: keycloak-db-1
    namespace: keycloak
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - echoes
