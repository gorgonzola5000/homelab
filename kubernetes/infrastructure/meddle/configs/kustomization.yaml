apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cloudflare-secret.enc.yaml
  - ../../base/configs/cert-manager
  - ../../base/configs/envoy-gateway
  - ../../base/configs/openebs
  - ../../base/configs/keycloak
  - keycloak-pv.yaml

patches:
  - path: lets-encrypt.yaml
  - path: keycloak-httproute-patch.yaml
  - path: keycloak-cr-patch.yaml
