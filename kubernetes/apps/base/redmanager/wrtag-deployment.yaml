apiVersion: apps/v1
kind: Deployment
metadata:
  name: wrtag
  labels:
    app: wrtag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wrtag
  template:
    metadata:
      labels:
        app: wrtag
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: wrtag
          image: registry.gitlab.com/starfruit6000/wrtag-flac:v0.30.0@sha256:89d530aed5793b59dfdf94ba4c5f2075641ba033207f85b699129e1f39a2a8cf
          env:
            - name: WRTAG_WEB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: redmanager-secret
                  key: WRTAG_WEB_API_KEY
            - name: WRTAG_PATH_FORMAT
              value: '/music/{{ artists .Release.Artists | sort | join "; " | safepath }}/({{ .Release.ReleaseGroup.FirstReleaseDate.Year }}) {{ .Release.Title | safepath }}{{ if not (eq .ReleaseDisambiguation "") }} ({{ .ReleaseDisambiguation | safepath }}){{ end }}/{{ if gt (len .Release.Media) 1 }}d{{ pad0 2 .Media.Position }} {{ end }}{{ pad0 2 .Track.Position }}.{{ .Media.TrackCount | pad0 2 }} {{ if .IsCompilation }}{{ artistsString .Track.Artists | safepath }} - {{ end }}{{ .Track.Title | safepath }}{{ .Ext }}'
            - name: WRTAG_ADDON
              value: "subproc /scripts/post-import.sh <files>"
            - name: WRTAG_COVER_UPGRADE
              value: "true"
            - name: WRTAG_LOG_LEVEL
              value: debug
          volumeMounts:
            - name: redmanager-download
              mountPath: /downloads
            - name: music
              mountPath: /music
            - name: script-volume
              mountPath: /scripts
          ports:
            - containerPort: 7373
              protocol: TCP

      volumes:
        - name: redmanager-download
          persistentVolumeClaim:
            claimName: redmanager-download
        - name: music
          persistentVolumeClaim:
            claimName: music
        - name: script-volume
          configMap:
            name: wrtag-post-import-script
            defaultMode: 0755
