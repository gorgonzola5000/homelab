apiVersion: v1
kind: ConfigMap
metadata:
  name: configarr
data:
  config.yml: |
    trashGuideUrl: https://github.com/TRaSH-Guides/Guides
    recyclarrConfigUrl: https://github.com/recyclarr/config-templates

    sonarr:
      series:
        base_url: http://arr:8989
        api_key: !env SONARR__AUTH__APIKEY
        quality_definition:
          type: series
        include:
        #  # WEB-1080p
        #  - template: sonarr-quality-definition-series
        #  - template: sonarr-v4-quality-profile-web-1080p
        #  - template: sonarr-v4-custom-formats-web-1080p
        #  # WEB-2160p
        #  - template: sonarr-v4-quality-profile-web-2160p
        #  - template: sonarr-v4-custom-formats-web-2160p
          # WEB-2160p (Combined)
          - template: c4cadd6b35b95f62c3d47a408e53e2f7
            source: TRASH
        custom_formats: []
        download_clients:
          data:
            - name: "qBittorrent"
              type: qbittorrent
              enable: true
              priority: 1
              remove_completed_downloads: false
              remove_failed_downloads: true
              fields:
                host: qbittorrent
                port: 8080
                use_ssl: false
                url_base: /
                username: !env QBITTORRENT_USER
                password: !env QBITTORRENT_PASS
          update_password: true
        root_folders:
          - /data/media/tv

    radarr:
      movies:
        base_url: http://arr:7878
        api_key: !env RADARR__AUTH__APIKEY
        include:
          # Remux 2160p (Combined)
          - template: d1d310673359205736b4b84acd5ea8c8
            source: TRASH
        custom_formats: []
        download_clients:
          data:
            - name: "qBittorrent"
              type: qbittorrent
              enable: true
              priority: 1
              remove_completed_downloads: false
              remove_failed_downloads: true
              fields:
                host: qbittorrent
                port: 8080
                use_ssl: false
                url_base: /
                username: !env QBITTORRENT_USER
                password: !env QBITTORRENT_PASS
          update_password: true
        root_folders:
          - /data/media/movies
