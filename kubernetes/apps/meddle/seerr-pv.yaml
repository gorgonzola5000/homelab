---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: seerr
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /tank/static/seerr/seerr
  claimRef:
    name: seerr-seerr-chart-config
    namespace: seerr
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - echoes
