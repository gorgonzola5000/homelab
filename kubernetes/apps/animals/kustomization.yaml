apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - redmanager-secret.enc.yaml
  - arr-secret.enc.yaml
  - ../base/redmanager
  - ../base/arr

patches:
  - path: redmanager-pvc-patch.yaml
  - path: redmanager-http-patch.yaml
  - path: arr-pvc-patch.yaml
  - path: arr-jellyfin-http-route-patch.yaml
  - target:
      kind: Deployment
      name: postgres
    path: redmanager-postgres-deployment-patch.yaml
